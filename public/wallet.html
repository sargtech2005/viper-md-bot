<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wallet — VIPER MD BOT</title>
<link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M4 16c0-4 3-6 6-6s6-2 6-6"/>
        <circle cx="16" cy="4" r="1.5" fill="currentColor" stroke="none"/>
        <path d="M4 16c0 1.1.9 2 2 2"/>
      </svg>
    </div>
    <span class="logo-text">VIPER <span>MD</span></span>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="nav-user" id="nav-user"></div>
    <button class="nav-logout" onclick="logout()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M13 5l4 5-4 5M17 10H8"/><path d="M8 3H4a1 1 0 00-1 1v12a1 1 0 001 1h4"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h14M3 10h14M3 14h14"/></svg>
      </button>
      <span class="topbar-title">Wallet</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-coins" id="topbar-coins" style="display:none">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg>
        <span id="topbar-coins-val">—</span>
      </div>
    </div>
  </header>

  <div class="page-body">

    <!-- Balance Banner -->
    <div class="card" style="margin-bottom:1.25rem;background:linear-gradient(135deg,var(--green-pale),#eff6ff);border-color:var(--green-mid)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Current Balance</div>
          <div style="display:flex;align-items:baseline;gap:.45rem">
            <span style="font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800;color:var(--green);line-height:1" id="wallet-balance">—</span>
            <span style="font-size:.85rem;color:var(--muted);font-weight:500">coins</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem">Session Cost</div>
          <div style="font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);line-height:1">10</div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:.2rem">coins per session</div>
        </div>
      </div>
    </div>

    <!-- Paystack not configured -->
    <div id="no-paystack" class="v-alert v-alert-info" style="display:none">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="width:15px;height:15px;flex-shrink:0"><circle cx="10" cy="10" r="8"/><path d="M10 7v4M10 14h.01"/></svg>
      <span>Payments are not yet configured. Contact the admin to enable coin purchases.</span>
    </div>

    <!-- Buy Coins -->
    <div class="card" id="packages-card" style="margin-bottom:1.25rem">
      <div class="card-header">
        <div>
          <div class="card-title">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg>
            Buy Coins
          </div>
          <div class="card-sub">Select a package to top up your balance</div>
        </div>
      </div>

      <div class="pkg-grid" id="pkg-grid">
        <div style="grid-column:1/-1;text-align:center;padding:2rem">
          <div class="vspin vspin-dark" style="width:22px;height:22px;margin:0 auto"></div>
        </div>
      </div>

      <div style="margin-top:1.25rem">
        <div id="buy-alert"></div>
        <button class="vbtn vbtn-green vbtn-full" id="buy-btn" onclick="buyCoins()" style="display:none">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg>
          Pay with Paystack
        </button>
      </div>
    </div>

    <!-- Payment History -->
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-header">
        <div class="card-title">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="5" width="16" height="12" rx="2"/><path d="M2 9h16M6 13h2M10 13h4"/></svg>
          Payment History
        </div>
      </div>
      <div id="payments-list">
        <div style="text-align:center;padding:1.5rem">
          <div class="vspin vspin-dark" style="width:20px;height:20px;margin:0 auto"></div>
        </div>
      </div>
    </div>

    <!-- Transaction History -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 10h14M13 5l5 5-5 5"/></svg>
          Coin Transactions
        </div>
      </div>
      <div id="tx-list">
        <div style="text-align:center;padding:1.5rem">
          <div class="vspin vspin-dark" style="width:20px;height:20px;margin:0 auto"></div>
        </div>
      </div>
    </div>

  </div><!-- /.page-body -->

  <footer class="app-footer">
    <div class="app-footer-inner">
      <a href="/dashboard.html" class="app-footer-logo">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 16c0-4 3-6 6-6s6-2 6-6"/><circle cx="16" cy="4" r="1.5" fill="currentColor" stroke="none"/><path d="M4 16c0 1.1.9 2 2 2"/></svg>
        VIPER MD
      </a>
      <div class="app-footer-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/sessions.html">Sessions</a>
        <a href="/settings.html">Settings</a>
      </div>
      <div class="app-footer-copy">&copy; 2026 VIPER MD Bot.</div>
    </div>
  </footer>
</div><!-- /.main-content -->

<script src="/js/common.js"></script>
<script>
let walletData    = null;
let selectedPkg   = null;
let paystackLoaded= false;

(async () => {
  const user = await requireLogin();
  if (!user) return;
  await loadWallet();
})();

async function loadWallet() {
  try {
    const d = await api('/api/wallet');
    walletData = d;

    const bal = fCoins(d.user.coins);
    document.getElementById('wallet-balance').textContent   = bal;
    document.getElementById('topbar-coins-val').textContent = bal;
    document.getElementById('topbar-coins').style.display   = 'flex';

    if (!d.paystack_public_key) {
      document.getElementById('no-paystack').style.display   = 'block';
      document.getElementById('packages-card').style.display = 'none';
    } else {
      renderPackages(d.packages);
      loadPaystack(d.paystack_public_key);
    }

    renderPayments(d.payments);
    renderTransactions(d.transactions);
  } catch (e) { toast(e.message, 'error'); }
}

function renderPackages(pkgs) {
  const grid = document.getElementById('pkg-grid');
  if (!pkgs?.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);font-size:.875rem;padding:1rem 0">No packages available yet.</div>';
    return;
  }
  grid.innerHTML = pkgs.map((p, i) => {
    const save = i > 0 ? Math.round((1 - (p.ngn / p.coins) / (pkgs[0].ngn / pkgs[0].coins)) * 100) : 0;
    return `<div class="pkg-card" id="pkg-${p.id}" onclick="selectPkg(${p.id})">
      ${save > 0 ? `<div class="pkg-save">Save ${save}%</div>` : ''}
      <div class="pkg-label">Package ${p.id}</div>
      <div class="pkg-coins">${fCoins(p.coins)}</div>
      <div style="font-size:.72rem;color:var(--muted);margin:.12rem 0">coins</div>
      <div class="pkg-price">₦${p.ngn.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function selectPkg(id) {
  document.querySelectorAll('.pkg-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`pkg-${id}`)?.classList.add('selected');
  selectedPkg = walletData.packages.find(p => p.id === id);
  const btn = document.getElementById('buy-btn');
  if (selectedPkg) {
    btn.style.display = 'flex';
    btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg>
      Buy ${fCoins(selectedPkg.coins)} Coins — ₦${selectedPkg.ngn.toLocaleString()}`;
  }
}

function loadPaystack(publicKey) {
  if (paystackLoaded) return;
  const s   = document.createElement('script');
  s.src     = 'https://js.paystack.co/v1/inline.js';
  s.onload  = () => { paystackLoaded = true; };
  document.head.appendChild(s);
}

async function buyCoins() {
  if (!selectedPkg)    return toast('Select a package first', 'error');
  if (!paystackLoaded) return toast('Paystack is loading, please wait a moment', 'info');

  const alertEl = document.getElementById('buy-alert');
  alertEl.innerHTML = '';
  const btn     = document.getElementById('buy-btn');
  btn.disabled  = true;
  btn.innerHTML = '<div class="vspin" style="width:14px;height:14px"></div> Initiating...';

  try {
    const d = await api('/api/wallet/initiate', { method:'POST', body:{ package_id: selectedPkg.id } });

    const handler = PaystackPop.setup({
      key:      d.public_key,
      email:    d.email,
      amount:   d.amount_kobo,
      ref:      d.reference,
      currency: 'NGN',
      metadata: { coins: d.coins },
      onSuccess: async (response) => {
        btn.innerHTML = '<div class="vspin" style="width:14px;height:14px"></div> Verifying...';
        try {
          const v = await api('/api/wallet/verify', { method:'POST', body:{ reference: response.reference } });
          toast(`✅ +${v.coins} coins added! New balance: ${fCoins(v.new_balance)}`, 'success');
          await loadWallet();
        } catch (e) {
          alertEl.innerHTML = `<div class="v-alert v-alert-error"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:14px;height:14px;flex-shrink:0"><circle cx="10" cy="10" r="8"/><path d="M10 7v4M10 14h.01"/></svg><span>Verification failed: ${e.message}. Contact support.</span></div>`;
        } finally {
          btn.disabled  = false;
          btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg> Buy ${fCoins(selectedPkg.coins)} Coins — ₦${selectedPkg.ngn.toLocaleString()}`;
        }
      },
      onCancel: () => {
        toast('Payment cancelled', 'info');
        btn.disabled  = false;
        btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg> Buy ${fCoins(selectedPkg.coins)} Coins — ₦${selectedPkg.ngn.toLocaleString()}`;
      },
    });
    handler.openIframe();
  } catch (e) {
    alertEl.innerHTML = `<div class="v-alert v-alert-error"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:14px;height:14px;flex-shrink:0"><circle cx="10" cy="10" r="8"/><path d="M10 7v4M10 14h.01"/></svg><span>${e.message}</span></div>`;
    btn.disabled  = false;
    btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 6v8M7 9h4a1.5 1.5 0 010 3H7"/></svg> Buy ${fCoins(selectedPkg.coins)} Coins — ₦${selectedPkg.ngn.toLocaleString()}`;
  }
}

function renderPayments(payments) {
  const el = document.getElementById('payments-list');
  if (!payments?.length) {
    el.innerHTML = `<div class="empty-state" style="padding:1.5rem 1rem">
      <div class="empty-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="16" height="12" rx="2"/><path d="M2 9h16"/></svg></div>
      <h3>No payments yet</h3>
      <p>Your payment history will appear here after your first purchase.</p>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Coins</th><th>Amount</th><th>Status</th><th></th></tr></thead>
    <tbody>${payments.map(p => `
      <tr>
        <td style="font-size:.8rem;color:var(--muted)">${fDate(p.created_at)}</td>
        <td><strong style="color:var(--green)">+${fCoins(p.coins)}</strong></td>
        <td>${fNgn(p.amount_kobo)}</td>
        <td><span class="badge ${p.status==='success'?'badge-green':p.status==='pending'?'badge-yellow':'badge-red'}">${p.status}</span></td>
        <td>${p.status === 'pending'
          ? `<button class="vbtn vbtn-outline vbtn-sm" onclick="retryVerify('${p.reference}',this)"
               title="If you already paid, click to verify and credit your coins">
               <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:11px;height:11px"><path d="M4 4v5h5M16 16v-5h-5"/><path d="M20.49 9A9 9 0 005.64 5.64L2 9M3.51 11A9 9 0 0014.36 14.36L18 11"/></svg>
               Retry
             </button>`
          : ''}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function retryVerify(reference, btn) {
  const origHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="vspin vspin-dark" style="width:11px;height:11px"></div>';
  try {
    const v = await api('/api/wallet/verify', { method:'POST', body:{ reference } });
    if (v.already) {
      toast('Payment was already verified — balance updated', 'success');
    } else {
      toast(`✅ Verified! +${v.coins} coins added. Balance: ${fCoins(v.new_balance)}`, 'success');
    }
    await loadWallet();
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = origHTML;
  }
}

function renderTransactions(txs) {
  const el = document.getElementById('tx-list');
  if (!txs?.length) {
    el.innerHTML = `<div class="empty-state" style="padding:1.5rem 1rem">
      <div class="empty-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10h14M13 5l5 5-5 5"/></svg></div>
      <h3>No transactions yet</h3>
      <p>Coin credits and debits will show here.</p>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
    <tbody>${txs.map(t => `
      <tr>
        <td style="font-size:.8rem;color:var(--muted)">${fDate(t.created_at)}</td>
        <td style="font-size:.83rem;color:var(--muted)">${t.description || t.type}</td>
        <td style="font-weight:700;color:${t.amount > 0 ? 'var(--green)' : 'var(--red)'}">
          ${t.amount > 0 ? '+' : ''}${t.amount} coins
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}
</script>
</body>
</html>
