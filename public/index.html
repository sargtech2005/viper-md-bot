<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VIPER MD BOT — Official Deployment Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#16a34a;
  --green-light:#22c55e;
  --green-pale:#f0fdf4;
  --green-mid:#dcfce7;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --white:#ffffff;
}

html{scroll-behavior:smooth}
body{
  background:var(--white);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.25rem 2.5rem;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
}
.nav-logo{
  display:flex;align-items:center;gap:.6rem;
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-.01em;
  color:var(--text);
}
.nav-logo .dot{
  width:10px;height:10px;border-radius:50%;background:var(--green-light);
  box-shadow:0 0 0 3px rgba(34,197,94,.2);
  animation:pulse 2.5s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}
  50%{box-shadow:0 0 0 6px rgba(34,197,94,.08)}
}
.nav-link{
  font-size:.875rem;font-weight:500;color:var(--muted);
  text-decoration:none;transition:color .15s;
}
.nav-link:hover{color:var(--text)}
.nav-actions{display:flex;align-items:center;gap:.75rem}

/* ── HERO ── */
.hero{
  min-height:calc(100vh - 65px);
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:4rem 1.5rem;
  position:relative;
  overflow:hidden;
}

/* Subtle grid background */
.hero::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.4;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black 40%, transparent 100%);
}

/* Green glow blob */
.hero::after{
  content:'';
  position:absolute;
  width:600px;height:400px;
  border-radius:50%;
  background:radial-gradient(ellipse, rgba(34,197,94,.12) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.hero-inner{
  position:relative;z-index:1;
  max-width:700px;
}

.hero-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.4rem 1rem;border-radius:100px;
  background:var(--green-pale);border:1px solid var(--green-mid);
  font-size:.8rem;font-weight:600;color:var(--green);
  margin-bottom:2rem;
  animation:fadeUp .6s ease both;
}
.hero-badge svg{width:12px;height:12px;fill:var(--green-light)}

h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.8rem,7vw,5rem);
  font-weight:800;
  line-height:.95;
  letter-spacing:-.03em;
  color:var(--text);
  margin-bottom:1.5rem;
  animation:fadeUp .6s .1s ease both;
}
h1 .accent{color:var(--green)}

.hero-sub{
  font-size:1.1rem;
  color:var(--muted);
  max-width:460px;
  margin:0 auto 2.5rem;
  line-height:1.65;
  animation:fadeUp .6s .2s ease both;
}

.hero-cta{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.85rem 2.2rem;
  background:var(--green);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:1rem;font-weight:600;
  border-radius:.6rem;
  text-decoration:none;
  transition:all .2s;
  box-shadow:0 4px 20px rgba(22,163,74,.3);
  animation:fadeUp .6s .3s ease both;
}
.hero-cta:hover{
  background:#15803d;
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(22,163,74,.35);
}
.hero-cta svg{width:18px;height:18px;transition:transform .2s}
.hero-cta:hover svg{transform:translateX(3px)}

.hero-login{
  display:block;margin-top:1rem;
  font-size:.875rem;color:var(--muted);
  text-decoration:none;
  animation:fadeUp .6s .4s ease both;
}
.hero-login span{color:var(--green);font-weight:600}
.hero-login:hover span{text-decoration:underline}

/* ── FEATURES STRIP ── */
.strip{
  border-top:1px solid var(--border);
  padding:2rem 2.5rem;
  display:flex;align-items:center;justify-content:center;gap:3rem;
  flex-wrap:wrap;
  background:var(--green-pale);
}
.strip-item{
  display:flex;align-items:center;gap:.5rem;
  font-size:.875rem;font-weight:500;color:var(--muted);
}
.strip-item svg{width:16px;height:16px;color:var(--green);flex-shrink:0}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  nav{padding:1rem 1.25rem}
  .strip{gap:1.5rem;padding:1.5rem 1.25rem}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="dot"></div>
    VIPER MD
  </div>
  <div class="nav-actions">
    <a href="/login.html" class="nav-link">Sign In</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge">
      <svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>
      Platform Live
    </div>

    <h1>VIPER<br/><span class="accent">MD BOT</span></h1>

    <p class="hero-sub">Official site to deploy your VIPER MD Bot. Pair your WhatsApp number and go live in seconds.</p>

    <a href="/register.html" class="hero-cta">
      Get Started
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10h12M12 5l5 5-5 5"/>
      </svg>
    </a>

    <a href="/login.html" class="hero-login">Already have an account? <span>Sign in</span></a>
  </div>
</section>

<div class="strip">
  <div class="strip-item">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 10a3 3 0 11-6 0 3 3 0 016 0z"/>
      <path d="M17.7 10a7.7 7.7 0 11-15.4 0 7.7 7.7 0 0115.4 0z"/>
    </svg>
    Instant Pairing
  </div>
  <div class="strip-item">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="16" height="14" rx="2"/>
      <path d="M8 10l2 2 4-4"/>
    </svg>
    Multi-Device Support
  </div>
  <div class="strip-item">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2H8L3 7v6l5 5h4l5-5V7l-5-5z"/>
      <path d="M10 8v4M10 14h.01"/>
    </svg>
    Always-On Sessions
  </div>
  <div class="strip-item">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 10a7 7 0 1014 0A7 7 0 003 10zM10 7v3l2 2"/>
    </svg>
    24/7 Uptime
  </div>
</div>

</body>
</html>
