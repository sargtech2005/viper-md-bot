<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — VIPER BOT MD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080d14;--card:#0f1923;--border:#1a2840;--green:#22c55e;--green-dim:#16a34a;--text:#e2e8f0;--muted:#64748b;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
a{color:var(--green);text-decoration:none}
.logo{font-size:1.4rem;font-weight:800;color:var(--green);margin-bottom:2rem;text-align:center}
.logo span{color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:2rem;width:100%;max-width:400px}
.card h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
.card p{font-size:.875rem;color:var(--muted);margin-bottom:1.8rem}
.field{margin-bottom:1.2rem}
label{display:block;font-size:.825rem;font-weight:600;color:var(--muted);margin-bottom:.4rem}
input{width:100%;padding:.75rem 1rem;background:#060c14;border:1px solid var(--border);border-radius:.6rem;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--green)}
input::placeholder{color:#334155}
.btn{width:100%;padding:.8rem;background:var(--green);color:#000;border:none;border-radius:.6rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover:not(:disabled){background:var(--green-dim)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:.5rem;padding:.75rem 1rem;font-size:.85rem;color:var(--red);margin-bottom:1rem;display:none}
.footer-link{text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--muted)}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">🐍 VIPER <span>BOT MD</span></div>

<div class="card">
  <h1>Welcome back</h1>
  <p>Sign in to manage your WhatsApp sessions</p>

  <div class="error" id="error-msg"></div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>

  <div class="footer-link">
    Don't have an account? <a href="/register.html">Create one free</a>
  </div>
</div>

<script>
const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const errEl   = document.getElementById('error-msg');
const btn     = document.getElementById('login-btn');

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email    = emailEl.value.trim();
  const password = passEl.value;
  errEl.style.display = 'none';

  if (!email || !password) return showError('Please fill in all fields');

  btn.disabled   = true;
  btn.innerHTML  = '<span class="loading"></span>Signing in...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    if (!r.ok) return showError(data.error || 'Login failed');
    window.location.href = '/dashboard.html';
  } catch {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Sign In';
  }
}

function showError(msg) {
  errEl.textContent    = msg;
  errEl.style.display  = 'block';
  btn.disabled         = false;
  btn.innerHTML        = 'Sign In';
}

// Redirect if already logged in
fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/dashboard.html'; }).catch(()=>{});
</script>
</body>
</html>
