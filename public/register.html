<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Create Account — VIPER BOT MD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080d14;--card:#0f1923;--border:#1a2840;--green:#22c55e;--green-dim:#16a34a;--text:#e2e8f0;--muted:#64748b;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
a{color:var(--green);text-decoration:none}
.logo{font-size:1.4rem;font-weight:800;color:var(--green);margin-bottom:2rem;text-align:center}
.logo span{color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:2rem;width:100%;max-width:420px}
.card h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
.bonus-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:.4rem;padding:.3rem .7rem;font-size:.78rem;color:var(--green);margin-bottom:1.5rem}
.field{margin-bottom:1.1rem}
label{display:block;font-size:.825rem;font-weight:600;color:var(--muted);margin-bottom:.4rem}
input{width:100%;padding:.75rem 1rem;background:#060c14;border:1px solid var(--border);border-radius:.6rem;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--green)}
input::placeholder{color:#334155}
.hint{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.btn{width:100%;padding:.8rem;background:var(--green);color:#000;border:none;border-radius:.6rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover:not(:disabled){background:var(--green-dim)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:.5rem;padding:.75rem 1rem;font-size:.85rem;color:var(--red);margin-bottom:1rem;display:none}
.footer-link{text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--muted)}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">🐍 VIPER <span>BOT MD</span></div>

<div class="card">
  <h1>Create your account</h1>
  <div class="bonus-badge">🎁 50 free coins on signup — 5 sessions included</div>

  <div class="error" id="error-msg"></div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="viperuser" autocomplete="username"/>
    <div class="hint">3–20 chars · letters, numbers, underscore only</div>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password"/>
  </div>

  <button class="btn" id="reg-btn" onclick="doRegister()">Create Account & Get 50 Coins</button>

  <div class="footer-link">
    Already have an account? <a href="/login.html">Sign in</a>
  </div>
</div>

<script>
const errEl = document.getElementById('error-msg');
const btn   = document.getElementById('reg-btn');

document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

async function doRegister() {
  const email    = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  errEl.style.display = 'none';

  if (!email || !username || !password) return showError('Please fill in all fields');

  btn.disabled  = true;
  btn.innerHTML = '<span class="loading"></span>Creating account...';

  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, username, password }),
    });
    const data = await r.json();
    if (!r.ok) return showError(data.error || 'Registration failed');
    window.location.href = '/dashboard.html';
  } catch {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Create Account & Get 50 Coins';
  }
}

function showError(msg) {
  errEl.textContent   = msg;
  errEl.style.display = 'block';
  btn.disabled        = false;
  btn.innerHTML       = 'Create Account & Get 50 Coins';
}

fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/dashboard.html'; }).catch(()=>{});
</script>
</body>
</html>
