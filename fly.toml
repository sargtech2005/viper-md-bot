# fly.toml — Viper Bot Fly.io config (Lightning ⚡)

app = "viper-md-bot"
primary_region = "ams"

[build]

[deploy]
  # "rolling" replaces one machine at a time — health check must pass before the
  # second machine is replaced. Requires 2+ machines (which you now have).
  # This gives zero-downtime deploys.
  strategy = "immediate"

[env]
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=3072"  # 3GB of 4GB RAM for Node heap

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # NEVER sleep — keep both machines always hot
  auto_start_machines = true
  min_machines_running = 1     # 1 machine — single instance to avoid session conflicts

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 4

[checks]
  [checks.health]
    grace_period = "60s"   # extra time for bot sessions to resume on startup
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "10s"
    type = "http"
