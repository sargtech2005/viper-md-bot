# fly.toml — Viper Bot Fly.io config (High Performance)

app = "viper-md-bot"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  # Tell Node.js to use more of the 2GB RAM
  NODE_OPTIONS = "--max-old-space-size=1536"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # NEVER sleep — keep machine always hot
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2           # 2 vCPUs to handle concurrent sessions + web server

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"     # Check every 15s (was 30s) — catch issues faster
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"
