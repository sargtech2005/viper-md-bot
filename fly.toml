# fly.toml — Viper Bot Fly.io config (Lightning ⚡)

app = "viper-md-bot"
primary_region = "ams"

[build]

[deploy]
  # "immediate" is correct for single-machine apps.
  # "rolling" requires 2+ machines — on 1 machine it deadlocks:
  # Fly keeps the old machine alive waiting to replace it, but there's
  # nowhere to put the new one, so both fail with "machine still active".
  strategy = "immediate"

[env]
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=1536 --expose-gc"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # NEVER sleep — keep machine always hot
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"
