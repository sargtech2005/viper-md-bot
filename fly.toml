# fly.toml — Viper Bot Fly.io config (Lightning Speed ⚡)

app = "viper-md-bot"
primary_region = "ams"

[build]

[deploy]
  # Rolling deploy = new machine starts and passes health check BEFORE old one stops.
  # Users never see a gap — instant cutover with zero downtime on every redeploy.
  strategy = "rolling"

[env]
  NODE_ENV = "production"
  # Node.js heap — V8 flags moved to entrypoint.sh for finer control
  NODE_OPTIONS = "--max-old-space-size=1536 --expose-gc"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # NEVER sleep — keep machine always hot
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2           # 2 vCPUs: concurrent sessions + web server

[checks]
  [checks.health]
    grace_period = "8s"      # Reduced: new container warms up fast now
    interval = "10s"         # Check every 10s — catch issues faster
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "4s"
    type = "http"
