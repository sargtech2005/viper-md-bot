# fly.toml — Viper Bot Fly.io config

app = "viper-md-bot"   # ← replace with your actual fly app name
primary_region = "iad"  # ← or your preferred region

[build]

[http_service]
  internal_port = 3000        # ← matches your EXPOSE 3000 and server.listen(3000)
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "10s"
    type = "http"